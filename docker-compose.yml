version: "3.9"

networks:
  loja-veloz-net:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

services:

  api-gateway:
    image: nginx:1.25-alpine
    container_name: api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./services/api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - pedidos
      - pagamentos
      - estoque
    networks:
      - loja-veloz-net
    restart: unless-stopped

  pedidos:
    build:
      context: ./services/pedidos
      dockerfile: Dockerfile
    container_name: pedidos-svc
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - APP_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - loja-veloz-net
    restart: unless-stopped

  pagamentos:
    build:
      context: ./services/pagamentos
      dockerfile: Dockerfile
    container_name: pagamentos-svc
    ports:
      - "3002:3002"
    environment:
      - APP_ENV=development
      - PAYMENT_GATEWAY_URL=${PAYMENT_GATEWAY_URL}
    networks:
      - loja-veloz-net
    restart: unless-stopped

  estoque:
    build:
      context: ./services/estoque
      dockerfile: Dockerfile
    container_name: estoque-svc
    ports:
      - "3003:3003"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - APP_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - loja-veloz-net
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loja-veloz-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./services/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - loja-veloz-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - loja-veloz-net
    restart: unless-stopped
